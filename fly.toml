# Fly.io app config
# https://fly.io/docs/reference/configuration/
#
# `fly launch` veya `fly deploy` çalıştırmadan önce app'i create etmek için:
#   fly apps create ssi-voting-backend
# (zaten varsa atla)

app = "ssi-voting-backend"
primary_region = "fra"   # Frankfurt - TR'ye en yakın free region

[build]
  dockerfile = "Dockerfile"

# Persistent volume (SQLite DB için)
# Volume oluşturma: fly volumes create ssi_data --region fra --size 1
[[mounts]]
  source = "ssi_data"
  destination = "/var/data"
  initial_size = "1gb"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8080"
  DB_PATH = "/var/data/database.db"
  # Blockchain (Sepolia)
  CHAIN_ID = "11155111"
  BLOCKCHAIN_RPC_URL = "https://ethereum-sepolia-rpc.publicnode.com"
  RPC_URL = "https://ethereum-sepolia-rpc.publicnode.com"
  VOTING_CONTRACT_ADDRESS = "0x62a8878de43d5d6fd9B199d92556843a57F39aae"
  # CORS / Frontend - Vercel deploy'dan sonra `fly secrets set` ile güncelle
  # CORS_ORIGINS, FRONTEND_URL secrets olarak ekleniyor

[http_service]
  internal_port = 8080
  force_https = true
  # Free tier'da idle iken durur, istek gelince başlar (cold start ~3sn)
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256   # 256MB free tier limit; better-sqlite3 + ethers + socket.io için yeterli
