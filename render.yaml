# Render Blueprint - https://render.com/docs/blueprint-spec
# Free plan kullanılıyor:
#  - Persistent disk YOK (SQLite restart'ta sıfırlanır - admin yeniden oluşturulur)
#  - 15 dk inaktivite sonra uyur (ilk istekte ~30sn cold start)
#  - 750 saat/ay free instance
#  - Kart bilgisi sorulmaz

services:
  - type: web
    name: ssi-voting-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: HOST
        value: 0.0.0.0
      # Render free: PORT'u kendisi atar, ama default 10000
      - key: PORT
        value: 10000
      # SQLite ephemeral - container içi (restart'ta sıfırlanır, free plan'da disk yok)
      - key: DB_PATH
        value: /opt/render/project/src/db/database.db
      - key: BLOCKCHAIN_RPC_URL
        value: https://ethereum-sepolia-rpc.publicnode.com
      - key: RPC_URL
        value: https://ethereum-sepolia-rpc.publicnode.com
      - key: CHAIN_ID
        value: "11155111"
      - key: VOTING_CONTRACT_ADDRESS
        value: "0x62a8878de43d5d6fd9B199d92556843a57F39aae"

      # --- AŞAĞIDAKİLERİ RENDER DASHBOARD'TAN MANUEL EKLE (sync: false) ---
      - key: ADMIN_PRIVATE_KEY
        sync: false
      - key: RELAYER_PRIVATE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: WALLET_ENCRYPTION_KEY
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: MAIL_PROVIDER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: CORS_ORIGINS
        sync: false   # Vercel deploy bittikten sonra gerçek URL'i gir
      - key: FRONTEND_URL
        sync: false
