<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC Receiver</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; background: #020617; color: #e2e8f0; margin: 0; padding: 20px; }
    .wrap { max-width: 1000px; margin: 0 auto; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    input, button { padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: #e2e8f0; }
    button { cursor: pointer; background: #16a34a; border: none; }
    video { width: 100%; max-height: 620px; background: #000; border-radius: 10px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .muted { color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PC Receiver</h1>

    <div class="card">
      <div class="row">
        <input id="roomId" placeholder="Oda Kodu" value="vote-room-1" />
        <button id="joinBtn">Yayina Baglan</button>
      </div>
      <p class="muted">Bilgisayarda bu sayfayi ac. Telefonda Streamer sayfasini acip ayni oda kodunu kullan.</p>
      <p class="muted" id="status">Durum: Bekleniyor</p>
    </div>

    <div class="card">
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const roomIdInput = document.getElementById('roomId');
    const statusEl = document.getElementById('status');
    const remoteVideo = document.getElementById('remoteVideo');
    let pc = null;

    function setStatus(msg) { statusEl.textContent = 'Durum: ' + msg; }

    function createPeer(streamerId) {
      pc = new RTCPeerConnection({
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      });

      pc.ontrack = (event) => {
        remoteVideo.srcObject = event.streams[0];
      };

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('webrtc:signal', {
            to: streamerId,
            payload: { type: 'ice', candidate: event.candidate }
          });
        }
      };

      pc.onconnectionstatechange = () => {
        setStatus('Baglanti: ' + pc.connectionState);
      };

      return pc;
    }

    socket.on('webrtc:streamer-available', () => {
      setStatus('Streamer hazir. Baglan tusuna basin.');
    });

    socket.on('webrtc:streamer-offline', () => {
      setStatus('Streamer baglantiyi kapatti.');
      if (pc) {
        pc.close();
        pc = null;
      }
      remoteVideo.srcObject = null;
    });

    socket.on('webrtc:signal', async ({ from, payload }) => {
      if (!pc) createPeer(from);

      if (payload.type === 'offer') {
        await pc.setRemoteDescription({ type: 'offer', sdp: payload.sdp });
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('webrtc:signal', {
          to: from,
          payload: { type: 'answer', sdp: answer.sdp }
        });
      } else if (payload.type === 'ice' && payload.candidate) {
        try { await pc.addIceCandidate(payload.candidate); } catch (_) {}
      }
    });

    document.getElementById('joinBtn').addEventListener('click', () => {
      const roomId = roomIdInput.value.trim();
      if (!roomId) return;
      socket.emit('webrtc:join', { roomId, role: 'receiver' });
      setStatus('Streamer bekleniyor...');
    });
  </script>
</body>
</html>
